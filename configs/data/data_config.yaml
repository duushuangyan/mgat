random_seed: 1958
# 设备选择
device: 'auto'  # 可选: 'cpu', 'cuda', 或 'auto' (自动选择GPU如果可用)
# 数据集参数
dataset:
  batch_size: 20  # 批次大小

# 仿真参数
simulation:
  time_steps: 100       # 仿真时间步数
  delta_t: 1.0         # 时间步长(秒)
  field_of_view_ub: 10000  # 视场上界(米)
  field_of_view_lb: 0      # 视场下界(米)
  # 目标数量和生命周期参数
  min_targets: 2     # 场景中最小允许的目标数量
  max_targets: 12     # 场景中最大允许的目标数量
  min_lifecycle: 12   # 目标最小生命周期（时间步）

  no_birth_last_steps: 4  # 最后多少个时间步禁止新生目标
  position_margin: 300  # 位置初始化时的边界裕度（米），确保目标完全在视场内
  direction_random_offset: 0.6  # 方向角随机偏移最大值θ（弧度），0.3 (~17°)，0.6 (~34°)，0.8 (~46°)，1.0 (~57°)

# 测量参数
measurement:
  range_noise: 0.05    # 距离测量噪声标准差(米)
  angle_noise: 0.001   # 角度测量噪声标准差(弧度)
  min_points: 20       # 每个目标每时间步最小测量点数
  avg_points: 30       # 每个目标每时间步平均测量点数(用于泊松分布)
  false_alarm_rate: 30.0  # 每次扫描平均虚警数(用于泊松分布)

# 过程噪声参数 (修改部分)
data_generation:
  process_noise:
    kinematic: [0.1, 0.1, 0.5, 0.5]
    # 方向角噪声标准差 (rad)
    orientation: 0.02
    # 形状噪声标准差 [major, minor] (米)。刚体目标建议设为 0 或极小值
    shape: [0.0, 0.0]

# 自动模式目标配置(在auto模式下使用)
auto_targets:
  # 新增目标新生和消亡参数
  p_birth: 0.08        # 每个时间步新增目标的概率
  p_death: 0.02        # 每个时间步目标消亡的概率
  avg_targets: 3       # 场景中平均初始目标数量
  # 初始形状参数范围
  initial_shape_state:
    major_axis:  # 长轴范围
      min: 100.0  # 最小长轴长度(米)
      max: 120.0  # 最大长轴长度(米)
    minor_axis:  # 短轴范围
      min: 60.0  # 最小短轴长度(米)
      max: 70.0  # 最大短轴长度(米)
  # 运动模型配置
  kinematics_model:
    # 运动模型类型: "CV_only" 或 "mixed"
    model_type: "CV_only"
    # 匀速直线运动(CV)模型参数
    cv_model:
      min_speed: 250.0  # 最小速度 (m/s)
      max_speed: 280.0  # 最大速度 (m/s)
    # 匀加速直线运动(CA)模型参数
    ca_model:
      min_initial_speed: 180.0  # 最小初始速度 (m/s)
      max_initial_speed: 200.0  # 最大初始速度 (m/s)
      min_acceleration: 3.0  # 最小加速度 (m/s²)
      max_acceleration: 5.0  # 最大加速度 (m/s²)
    # 匀速转弯(CT)模型参数
    ct_model:
      min_speed: 240.0  # 最小速度 (m/s)
      max_speed: 260.0  # 最大速度 (m/s)
      min_turn_rate: -0.2  # 最小转向率 (rad/s)
      max_turn_rate: 0.2  # 最大转向率 (rad/s)

  # 目标方向角控制
  heading:
    # 方向模式: "auto" (跟随运动方向) 或 "manual" (手动配置)
    mode: "auto"
    # 手动模式下的方向角 (rad)
    angle: 0.0